<ion-content class="curriculum-content ion-padding">
  <h1>Curriculum</h1>

  @for (phase of phases(); track phase.id) {
    <app-curriculum-phase
      [headingId]="phase.id + '-heading'"
      [title]="phase.title"
      [meta]="phase.meta"
      [weeks]="phase.weeks"
    />
  }

  <section class="curriculum-future-phase" aria-label="Future phases">
    @for (phase of futurePhases; track phase.id) {
      <app-curriculum-node
        [title]="phase.title"
        [status]="phase.status"
        [statusText]="phase.statusText"
      />
    }
  </section>
</ion-content>
