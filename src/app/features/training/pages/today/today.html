<ion-content class="sw-safe-area-content">
  <h1>Today</h1>

  @if (workoutLabel(); as workoutLabel) {
    <p>{{ workoutLabel }}</p>
  }

  @if (workoutTitle(); as workoutTitle) {
    <p>{{ workoutTitle }}</p>
  }

  @if (inProgressWorkout()) {
    <p>{{ completedDrillCount() }} drills complete</p>
  }

  <ion-button routerLink="/active-workout" routerDirection="forward">
    {{ workoutActionLabel() }}
  </ion-button>
</ion-content>
