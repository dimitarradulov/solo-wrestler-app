<ion-content class="aw-content">
  <main class="aw-shell">
    @if (currentWorkout(); as workout) {
      @if (currentWorkoutTemplate(); as workoutTemplate) {
        <app-active-workout-header
          [workout]="workout"
          [workoutTemplate]="workoutTemplate"
          [phaseTitle]="phaseTitle()"
          [estimatedMinutes]="estimatedMinutes()"
          [progressionFocus]="progressionFocus()"
        />

        <app-active-workout-progress-strip
          [workoutTemplate]="workoutTemplate"
          [completedDrillCount]="completedDrillCount()"
        />

        <app-active-workout-drill-list
          [drills]="workoutTemplate.drills"
          [defaultRestSeconds]="defaultRestSeconds"
        />

        <ion-button
          class="finish"
          routerLink="/workout-completion"
          routerDirection="forward"
          expand="block"
        >
          <ion-icon
            name="flag-outline"
            slot="start"
            aria-hidden="true"
          ></ion-icon>
          Finish Workout
        </ion-button>
      } @else {
        <section class="empty">
          <h1>Active Workout</h1>
          <p>No workout template is currently available.</p>
        </section>
      }
    } @else {
      <section class="empty">
        <h1>Active Workout</h1>
        <p>No workout is currently available.</p>
      </section>
    }
  </main>
</ion-content>
