<section class="strip" aria-label="Workout progress">
  <div>
    <span>
      {{
        workoutTemplate() | activeWorkoutDrillProgress: completedDrillCount()
      }}
    </span>
    <strong> Current: {{ currentDrillTitle() }} </strong>
  </div>
  <div class="track" aria-hidden="true">
    <span [style.width.%]="progressPercent()"></span>
  </div>
</section>
