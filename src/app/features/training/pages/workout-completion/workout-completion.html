<ion-content class="completion-content sw-safe-area-content">
  <main class="completion-shell">
    <header class="completion-header">
      <h1>Workout Completion</h1>
      <p id="difficulty-prompt">How did this workout feel?</p>
    </header>

    <div class="completion-card">
      <div
        class="difficulty-options"
        role="group"
        aria-labelledby="difficulty-prompt"
      >
        <ion-button
          data-testid="difficulty-easy"
          type="button"
          [fill]="selectedDifficulty() === 'easy' ? 'solid' : 'outline'"
          [attr.aria-pressed]="selectedDifficulty() === 'easy'"
          (click)="selectDifficulty('easy')"
        >
          Easy
        </ion-button>
        <ion-button
          data-testid="difficulty-good"
          type="button"
          [fill]="selectedDifficulty() === 'good' ? 'solid' : 'outline'"
          [attr.aria-pressed]="selectedDifficulty() === 'good'"
          (click)="selectDifficulty('good')"
        >
          Good
        </ion-button>
        <ion-button
          data-testid="difficulty-hard"
          type="button"
          [fill]="selectedDifficulty() === 'hard' ? 'solid' : 'outline'"
          [attr.aria-pressed]="selectedDifficulty() === 'hard'"
          (click)="selectDifficulty('hard')"
        >
          Hard
        </ion-button>
      </div>

      <div class="notes-field">
        <div class="notes-field__label">
          <label for="completion-note">Notes</label>
          <span>Optional</span>
        </div>
        <textarea
          id="completion-note"
          rows="5"
          (input)="updateNote($any($event.target).value)"
        ></textarea>
      </div>

      <ion-button
        class="save-workout"
        data-testid="save-workout"
        expand="block"
        [disabled]="!canSaveWorkout()"
        (click)="saveWorkout()"
      >
        Save Workout
      </ion-button>
    </div>
  </main>
</ion-content>
